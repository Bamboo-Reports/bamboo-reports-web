[build]
  # Build command for your React/Vite app
  command = "npm run build"
  # Directory to publish (output of vite build)
  publish = "dist"
  # Functions directory
  functions = "netlify/functions"

# Redirect rules for SPA (Single Page Application)
# NOTE: More specific redirects (like /api/* below) must come BEFORE the catch-all "/*" rule,
# because Netlify evaluates redirects in file order.

# API: server-side tracker function (keeps DB access server-side, no data leakage)
[[redirects]]
  from = "/api/tracker"
  to = "/.netlify/functions/tracker"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Build settings
[build.environment]
  NODE_VERSION = "18"

# Function settings
[functions]
  # Directory for serverless functions
  directory = "netlify/functions"
  # Use ESM modules
  node_bundler = "esbuild"

# Local dev server settings (netlify dev)
[dev]
  command = "npm run dev"
  targetPort = 8080
  framework = "#custom"
